global:
  scrape_interval:     15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Node Exporter — system metrics (CPU, RAM, disk, network)
  # VM sendiri (lokal)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter-vm:9100"]

  # Node Exporter — VM lain (ganti IP:9100 sesuai VM target)
  - job_name: "node-exporter-vm-lain"
    static_configs:
      - targets: ["192.168.1.100:9100"]   # ← GANTI dengan IP VM lain
    # Bisa tambah lebih banyak VM:
    # - targets: ["192.168.1.101:9100", "192.168.1.102:9100"]

  # cAdvisor — container metrics (local)
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor-vm:8080"]
