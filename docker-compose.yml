version: "3.8"

services:
  prometheus:
    image: docker.io/prom/prometheus:latest
    container_name: prometheus-vm
    ports:
      - "9092:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro,z
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped
    networks:
      - monitoring-vm

  grafana:
    image: docker.io/grafana/grafana:latest
    container_name: grafana-vm
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro,z
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro,z
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - monitoring-vm

  node-exporter:
    image: docker.io/prom/node-exporter:latest
    container_name: node-exporter-vm
    ports:
      - "9101:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    restart: unless-stopped
    networks:
      - monitoring-vm

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor-vm
    ports:
      - "8082:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/containers:/var/lib/containers:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    restart: unless-stopped
    networks:
      - monitoring-vm

volumes:
  prometheus-data:
  grafana-data:

networks:
  monitoring-vm:
    driver: bridge
